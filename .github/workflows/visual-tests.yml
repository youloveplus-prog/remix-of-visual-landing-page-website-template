name: visual-tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  visual:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install JS dependencies
        run: |
          if [ -f bun.lockb ] || [ -f bun.lock ]; then
            curl -fsSL https://bun.sh/install | bash
            export PATH="$HOME/.bun/bin:$PATH"
            bun install --frozen-lockfile
            echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
          else
            npm ci
          fi

      - name: Install Python test dependencies
        run: |
          python -m pip install --no-cache-dir playwright==1.47.0 Pillow==10.4.0
          python -m playwright install --with-deps chromium

      - name: Start dev server
        run: |
          (npm run dev -- --host 127.0.0.1 --port 8080 > /tmp/dev.log 2>&1 &) || \
          (bun run dev --host 127.0.0.1 --port 8080 > /tmp/dev.log 2>&1 &)
          echo "Waiting for http://localhost:8080 ..."
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/ > /dev/null; then
              echo "Dev server is up."
              exit 0
            fi
            sleep 1
          done
          echo "Dev server failed to start. Logs:"
          tail -n 200 /tmp/dev.log
          exit 1

      - name: Capture screenshots
        env:
          PREVIEW_URL: http://localhost:8080
        run: |
          python tests/visual/product-card-price.spec.py
          python tests/visual/homepage-layout.spec.py

      - name: Check baselines exist
        id: baselines
        run: |
          if [ ! -d tests/visual/__baselines__ ] || [ -z "$(ls -A tests/visual/__baselines__ 2>/dev/null)" ]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            echo "Missing baselines" | tee /tmp/diff.log
            echo ""
            echo "========================================"
            echo "ERROR: Visual baseline images are missing"
            echo "----------------------------------------"
            echo "Folder tests/visual/__baselines__/ does not exist or is empty."
            echo ""
            echo "The screenshots just captured in this run have been uploaded as the"
            echo "'visual-baselines-candidate' artifact. Download it to review, or run"
            echo "locally to regenerate and commit:"
            echo "  python tests/visual/diff.py --update"
            echo "  git add tests/visual/__baselines__"
            echo "  git commit -m 'Add visual baselines'"
            echo "========================================"
            echo ""
            exit 1
          fi
          echo "missing=false" >> "$GITHUB_OUTPUT"

      - name: Upload baseline candidates (missing baselines)
        if: always() && steps.baselines.outputs.missing == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines-candidate
          path: tests/visual/__screenshots__/**
          if-no-files-found: warn
          retention-days: 14

      - name: Compare against baselines
        id: diff
        if: steps.baselines.outputs.missing != 'true'
        run: python tests/visual/diff.py | tee /tmp/diff.log

      - name: Upload screenshots and diffs
        if: always() && steps.baselines.outputs.missing != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: visual-screenshots
          path: |
            tests/visual/__screenshots__/**
            tests/visual/__diffs__/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Comment PR with diff summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '### Visual tests\n\n';
            let log = '';
            try { log = fs.readFileSync('/tmp/diff.log', 'utf8'); } catch {}
            const status = '${{ job.status }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const hasMissingBaselines = log.includes('Missing baselines') || log.includes('baseline images are missing');
            if (status === 'success') {
              body += 'Passed — no visual regressions detected.\n\n';
            } else if (hasMissingBaselines) {
              body += '**Failed — baseline images are missing.**\n\n';
              body += 'Run this command locally to generate baselines, then commit them in the same PR:\n';
              body += '```bash\npython tests/visual/diff.py --update\ngit add tests/visual/__baselines__\ngit commit -m "Add visual baselines"\n```\n\n';
            } else {
              body += 'Failed — visual diffs detected or test errored.\n\n';
            }
            const artifactName = hasMissingBaselines ? 'visual-baselines-candidate' : 'visual-screenshots';
            if (status === 'success') {
              body += `Artifact: [${artifactName}](${runUrl}) — captured screenshots.\n\n`;
            } else if (hasMissingBaselines) {
              body += `**Newly captured screenshots are uploaded as the [\`visual-baselines-candidate\`](${runUrl}) artifact** so you can review them immediately. Download from the run page, verify they look correct, then commit them under \`tests/visual/__baselines__/\` (or run \`python tests/visual/diff.py --update\` locally).\n\n`;
            } else {
              body += `Artifact: [${artifactName}](${runUrl}) — screenshots + red-highlighted diff overlays for failing breakpoints.\n\n`;
            }
            if (log) body += '```\n' + log.slice(-3500) + '\n```\n';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.startsWith('### Visual tests'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body,
              });
            }
