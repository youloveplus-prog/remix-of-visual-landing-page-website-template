name: visual-tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  visual:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install JS dependencies
        run: |
          if [ -f bun.lockb ] || [ -f bun.lock ]; then
            curl -fsSL https://bun.sh/install | bash
            export PATH="$HOME/.bun/bin:$PATH"
            bun install --frozen-lockfile
            echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
          else
            npm ci
          fi

      - name: Install Python test dependencies
        run: |
          python -m pip install --no-cache-dir playwright==1.47.0 Pillow==10.4.0
          python -m playwright install --with-deps chromium

      - name: Start dev server
        run: |
          (npm run dev -- --host 127.0.0.1 --port 8080 > /tmp/dev.log 2>&1 &) || \
          (bun run dev --host 127.0.0.1 --port 8080 > /tmp/dev.log 2>&1 &)
          echo "Waiting for http://localhost:8080 ..."
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/ > /dev/null; then
              echo "Dev server is up."
              exit 0
            fi
            sleep 1
          done
          echo "Dev server failed to start. Logs:"
          tail -n 200 /tmp/dev.log
          exit 1

      - name: Capture screenshots
        env:
          PREVIEW_URL: http://localhost:8080
        run: python tests/visual/product-card-price.spec.py

      - name: Compare against baselines
        id: diff
        run: python tests/visual/diff.py | tee /tmp/diff.log

      - name: Upload screenshots and diffs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-screenshots
          path: |
            tests/visual/__screenshots__/**
            tests/visual/__diffs__/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Comment PR with diff summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '### Visual tests\n\n';
            let log = '';
            try { log = fs.readFileSync('/tmp/diff.log', 'utf8'); } catch {}
            const status = '${{ job.status }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            body += status === 'success'
              ? `Passed — no visual regressions detected.\n\n`
              : `Failed — visual diffs detected or test errored.\n\n`;
            body += `Artifact: [visual-screenshots](${runUrl}) (screenshots + red-highlighted diff overlays for any failing breakpoints).\n\n`;
            if (log) body += '```\n' + log.slice(-3500) + '\n```\n';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.startsWith('### Visual tests'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body,
              });
            }
