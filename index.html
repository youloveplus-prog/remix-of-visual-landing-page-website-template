<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- Theme bootstrap — must run before any CSS to prevent dark/light flash. -->
    <script>
      (function () {
        try {
          var ls = window.localStorage;
          var stored = ls && ls.getItem('theme');
          var systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored === 'dark' || stored === 'light'
            ? stored
            : (stored === 'system' || !stored ? (systemDark ? 'dark' : 'light') : 'light');
          var root = document.documentElement;
          root.classList.remove('light', 'dark');
          root.classList.add(theme);
          root.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>
    <meta name="theme-color" content="#faf6ef" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="msapplication-navbutton-color" content="#0a0a0f" />
    <title>Asikon — AI-Powered Learning Platform</title>
    <meta name="description" content="Asikon is the AI-powered learning platform where students discover courses, books, and study essentials with smart recommendations.">
    <meta name="author" content="Asikon" />

    <!-- Sitewide social fallback (non-JS crawlers). Per-route SEO overrides via react-helmet-async. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://style-verse-suite.lovable.app/" />
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/attachments/og-images/0dcccf65-a2e2-4ca0-a953-c2bd4602ea4e">
    <meta property="og:site_name" content="Asikon" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Asikon" />
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/attachments/og-images/0dcccf65-a2e2-4ca0-a953-c2bd4602ea4e">

    <!-- Preconnect to Supabase API for faster first data fetch (LCP) -->
    <link rel="preconnect" href="https://tdbqeecjvitorxamzlok.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://tdbqeecjvitorxamzlok.supabase.co" />

    <!-- PWA / installability -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Asikon" />

    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <!-- Fonts: Noto family loaded via @fontsource in src/main.tsx (Noto Serif Display headlines, Noto Sans body, Noto Sans Mono labels). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Sitewide structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Asikon",
        "url": "https://style-verse-suite.lovable.app/",
        "logo": "https://style-verse-suite.lovable.app/favicon.ico",
        "description": "Asikon is an AI-powered learning platform with courses, books, study tools, and 1-on-1 mentorship."
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Asikon",
        "url": "https://style-verse-suite.lovable.app/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://style-verse-suite.lovable.app/shop?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <meta property="og:title" content="Asikon — AI-Powered Learning Platform">
    <meta name="twitter:title" content="Asikon — AI-Powered Learning Platform">
    <meta property="og:description" content="Asikon is the AI-powered learning platform where students discover courses, books, and study essentials with smart recommendations.">
    <meta name="twitter:description" content="Asikon is the AI-powered learning platform where students discover courses, books, and study essentials with smart recommendations.">
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
