<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- Theme bootstrap — must run before any CSS to prevent dark/light flash. -->
    <script>
      (function () {
        try {
          var root = document.documentElement;
          root.classList.remove('light');
          root.classList.add('dark');
          root.style.colorScheme = 'dark';
        } catch (e) {}

      })();
    </script>
    <meta name="theme-color" content="#faf6ef" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="msapplication-navbutton-color" content="#0a0a0f" />
    <title>Asikon — AI-Powered Learning Platform</title>
    <meta name="description" content="Asikon is the AI-powered learning platform where students discover courses, books, and study essentials with smart recommendations.">
    <meta name="author" content="Asikon" />

    <!-- Sitewide social fallback (non-JS crawlers). Per-route SEO overrides via react-helmet-async. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://style-verse-suite.lovable.app/" />
    <meta property="og:image" content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/1ac79be2-1e1c-45ff-b1b7-60acbb84b052/id-preview-a17ba2e1--3899c79d-54b1-4c6f-b75e-cc1f9fb77a7c.lovable.app-1782150191578.png">
    <meta property="og:site_name" content="Asikon" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Asikon" />
    <meta name="twitter:image" content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/1ac79be2-1e1c-45ff-b1b7-60acbb84b052/id-preview-a17ba2e1--3899c79d-54b1-4c6f-b75e-cc1f9fb77a7c.lovable.app-1782150191578.png">

    <!-- Preconnect to Supabase API for faster first data fetch (LCP) -->
    <link rel="preconnect" href="https://tdbqeecjvitorxamzlok.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://tdbqeecjvitorxamzlok.supabase.co" />

    <!-- PWA / installability -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Asikon" />

    <!-- Fonts: Satoshi (primary) via Fontshare + Noto Sans Bengali/Mono via Google Fonts. -->
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap" />

    <!-- Sitewide structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Asikon",
        "url": "https://style-verse-suite.lovable.app/",
        "logo": "https://style-verse-suite.lovable.app/favicon.ico",
        "description": "Asikon is an AI-powered learning platform with courses, books, study tools, and 1-on-1 mentorship."
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Asikon",
        "url": "https://style-verse-suite.lovable.app/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://style-verse-suite.lovable.app/shop?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    
    
    
    
    <meta property="og:title" content="Asikon — AI-Powered Learning Platform">
  <meta name="twitter:title" content="Asikon — AI-Powered Learning Platform">
  <meta property="og:description" content="Asikon is the AI-powered learning platform where students discover courses, books, and study essentials with smart recommendations.">
  <meta name="twitter:description" content="Asikon is the AI-powered learning platform where students discover courses, books, and study essentials with smart recommendations.">
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
